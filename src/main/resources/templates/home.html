<div>
    <form action="/newpost" method="POST">
        Tytuł: <input type="text" name="title" size="150" />
        Treść:
        <textarea name="content" cols="150" rows="5"></textarea>
        <input type="submit" value="Dodaj wpis" />
    </form>
</div>
<div>
    <table>
        <tr>
            <th>Usun</th>
            <th>ID</th>
            <th>title</th>
            <th>content</th>
        </tr>
        <th:block th:each="post : ${blogPost}">
            <tr>
                <td><a th:href="@{/deletepost(id=${post.id})}">Usun</a></td>
                <td th:text="${post.id}"></td>
                <td th:text="${post.title}"></td>
                <td th:text="${post.content}"></td>

            </tr>
        </th:block>
    </table>
</div>
